let currentFilter = 'ALL';
let sortKey = 'date';
let sortDir = 1;

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === f || (f === 'ALL' && b.textContent.trim() === 'All'));
  });
  renderTable();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderTable();
}

function getFiltered() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  return DATA.filter(r => {
    if (currentFilter === 'W' || currentFilter === 'L') {
      if (r.wl !== currentFilter) return false;
    } else if (currentFilter !== 'ALL') {
      if (!r.sport.includes(currentFilter)) return false;
    }
    if (search && !r.selection.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderTable() {
  const filtered = getFiltered();
  filtered.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });

  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const wlClass = r.wl === 'W' ? 'win' : r.wl === 'L' ? 'loss' : r.wl === 'Push' ? 'push' : 'ppd';
    const pnlClass = r.pnl > 0 ? 'pnl-pos' : r.pnl < 0 ? 'pnl-neg' : 'pnl-zero';
    const cumClass = r.cum > 0 ? 'pnl-pos' : r.cum < 0 ? 'pnl-neg' : 'pnl-zero';
    const sportKey = r.sport.replace('/','').replace(' ','');
    const sportClass = ['MLB','CBB','NFL','NHL','CFB','PGA','NBA','WC'].includes(r.sport) ? 'sport-'+r.sport.replace('/','') : 'sport-other';
    const pnlStr = r.pnl === 0 ? '—' : (r.pnl > 0 ? '+' : '') + r.pnl.toFixed(2) + 'u';
    const cumStr = (r.cum >= 0 ? '+' : '') + r.cum.toFixed(2) + 'u';
    const oddsStr = r.odds > 0 ? '+' + r.odds : r.odds;
    return `<tr>
      <td style="white-space:nowrap">${r.date}</td>
      <td>${r.selection}</td>
      <td><span class="sport-badge ${sportClass}">${r.sport}</span></td>
      <td>${oddsStr}</td>
      <td>${r.units === 0 ? '—' : r.units + 'u'}</td>
      <td class="${wlClass}">${r.wl}</td>
      <td class="${pnlClass}">${pnlStr}</td>
      <td class="${cumClass}">${cumStr}</td>
    </tr>`;
  }).join('');
}

function buildStats() {
  const wins = DATA.filter(r => r.wl === 'W').length;
  const losses = DATA.filter(r => r.wl === 'L').length;
  const pushes = DATA.filter(r => r.wl === 'Push' || r.wl === 'PPD').length;
  const totalDecided = wins + losses;
  const winPct = totalDecided > 0 ? (wins/totalDecided*100).toFixed(1) : '0.0';
  const totalPnl = DATA[DATA.length - 1].cum;
  const pnlStr = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="label">Record</div><div class="value record">${wins}–${losses}–${pushes}</div></div>
    <div class="stat-card"><div class="label">Win Rate</div><div class="value">${winPct}%</div></div>
    <div class="stat-card"><div class="label">Unit P&amp;L</div><div class="value green">${pnlStr}u</div></div>
    <div class="stat-card"><div class="label">Selections</div><div class="value record">${DATA.length}</div></div>
  `;
}

function buildSportBreakdown() {
  const sports = {};
  DATA.forEach(r => {
    const s = r.sport;
    if (!sports[s]) sports[s] = {w:0, l:0, pnl:0};
    if (r.wl === 'W') sports[s].w++;
    else if (r.wl === 'L') sports[s].l++;
    sports[s].pnl += r.pnl;
  });

  const order = ['MLB','CBB','NFL','NHL','CFB','NBA','PGA','WC','CBB/NFL','CBB/NHL'];
  const sorted = Object.keys(sports).sort((a,b) => {
    const ai = order.indexOf(a); const bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  document.getElementById('sportBreakdown').innerHTML = sorted.map(s => {
    const d = sports[s];
    const pnlStr = (d.pnl >= 0 ? '+' : '') + d.pnl.toFixed(2) + 'u';
    const pnlClass = d.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    return `<div class="sport-card">
      <div class="sname">${s}</div>
      <div class="swl">${d.w}–${d.l}</div>
      <div class="spnl ${pnlClass}">${pnlStr}</div>
    </div>`;
  }).join('');
}

function buildChart() {
  const ctx = document.getElementById('pnlChart').getContext('2d');
  const labels = DATA.map(r => r.date);
  const values = DATA.map(r => r.cum);
  const colors = values.map((v, i) => v >= 0 ? 'rgba(76,175,130,0.9)' : 'rgba(224,92,92,0.9)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Cumulative Units',
        data: values,
        borderColor: '#c9a84c',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: '#c9a84c',
        fill: true,
        backgroundColor: (ctx) => {
          const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 200);
          gradient.addColorStop(0, 'rgba(201,168,76,0.18)');
          gradient.addColorStop(1, 'rgba(201,168,76,0.01)');
          return gradient;
        },
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#132233',
          borderColor: '#c9a84c',
          borderWidth: 1,
          titleColor: '#8a9bb0',
          bodyColor: '#f0ece4',
          callbacks: {
            label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(2) + ' units'
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#4a5a6a', maxTicksLimit: 12, font: { size: 10 } },
          grid: { color: '#1a2a3a' }
        },
        y: {
          ticks: { color: '#4a5a6a', font: { size: 10 }, callback: v => (v >= 0 ? '+' : '') + v + 'u' },
          grid: { color: '#1a2a3a' },
          beginAtZero: false
        }
      }
    }
  });
}

buildStats();
buildSportBreakdown();
buildChart();
renderTable();
</script>
