
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ken Murphy Sports — Track Record</title>
<style>
  :root{
    --navy:#0d1b2a;
    --navy2:#132638;
    --gold:#c9a84c;
    --off:#f0ece4;
    --muted:#7a8a9a;
    --win:#4caf7d;
    --loss:#c9564f;
    --push:#7a8a9a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--navy);
    color:var(--off);
    font-family:'Georgia','Times New Roman',serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--gold);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* NAV */
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 24px;
    background:var(--navy2);
    border-bottom:1px solid rgba(201,168,76,0.25);
    position:sticky;
    top:0;
    z-index:50;
  }
  .nav-left a{
    color:var(--off);
    font-size:14px;
    letter-spacing:0.02em;
    font-weight:bold;
  }
  .nav-left a:hover{color:var(--gold);text-decoration:none;}
  .nav-right a{
    background:var(--gold);
    color:var(--navy);
    padding:9px 20px;
    border-radius:3px;
    font-weight:bold;
    font-size:13px;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .nav-right a:hover{
    background:#dabf6c;
    text-decoration:none;
  }

  .wrap{max-width:1100px;margin:0 auto;padding:0 24px;}

  header.hero{
    text-align:center;
    padding:48px 24px 32px;
  }
  header.hero h1{
    font-size:34px;
    letter-spacing:0.03em;
    margin:0 0 8px;
    color:var(--off);
  }
  header.hero .tag{
    color:var(--gold);
    font-size:14px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin:0 0 6px;
  }
  header.hero .sub{
    color:var(--muted);
    font-size:15px;
    margin:0;
  }

  /* STAT CARDS */
  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
    margin:32px 0;
  }
  .stat-card{
    background:var(--navy2);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:6px;
    padding:20px;
    text-align:center;
  }
  .stat-card .label{
    color:var(--muted);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .stat-card .value{
    font-size:26px;
    font-weight:bold;
    color:var(--gold);
  }
  .stat-card .value.pos{color:var(--win);}
  .stat-card .value.neg{color:var(--loss);}

  /* CHART */
  .chart-section{
    background:var(--navy2);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:6px;
    padding:20px;
    margin-bottom:32px;
  }
  .chart-section h2{
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 16px;
    font-weight:normal;
  }
  #chartSvg{width:100%;height:auto;display:block;}

  /* FILTERS */
  .filters{
    display:flex;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
    align-items:center;
  }
  .filters select, .filters input{
    background:var(--navy2);
    border:1px solid rgba(201,168,76,0.3);
    color:var(--off);
    padding:8px 12px;
    border-radius:4px;
    font-family:inherit;
    font-size:13px;
  }
  .filters .count{
    color:var(--muted);
    font-size:13px;
    margin-left:auto;
  }

  /* TABLE */
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--navy2);
    border-radius:6px;
    overflow:hidden;
    font-size:13.5px;
  }
  thead th{
    background:rgba(201,168,76,0.12);
    color:var(--gold);
    text-align:left;
    padding:10px 12px;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    border-bottom:1px solid rgba(201,168,76,0.25);
  }
  tbody td{
    padding:9px 12px;
    border-bottom:1px solid rgba(122,138,154,0.15);
    vertical-align:top;
  }
  tbody tr:hover{background:rgba(201,168,76,0.05);}
  .res-W{color:var(--win);font-weight:bold;}
  .res-L{color:var(--loss);font-weight:bold;}
  .res-Push{color:var(--push);font-weight:bold;}
  .pnl-pos{color:var(--win);}
  .pnl-neg{color:var(--loss);}
  .pnl-zero{color:var(--muted);}
  .flat-tag{
    color:var(--muted);
    font-size:11px;
    letter-spacing:0.06em;
  }

  footer{
    text-align:center;
    padding:40px 24px 50px;
    color:var(--muted);
    font-size:13px;
  }
  footer a{margin:0 10px;}

  @media (max-width:700px){
    .stats{grid-template-columns:repeat(2,1fr);}
    header.hero h1{font-size:26px;}
    table{font-size:12px;}
    thead th, tbody td{padding:7px 8px;}
  }
</style>
</head>

// ---------- Summary stats ----------
const wins = RAW.filter(r => r.wl === 'W').length;
const losses = RAW.filter(r => r.wl === 'L').length;
const pushes = RAW.filter(r => r.wl === 'Push').length;
const total = RAW.length;
const winRate = (wins / (wins + losses) * 100);
const netUnits = RAW.reduce((s, r) => s + r.pnl, 0);

netEl.textContent = (netUnits >= 0 ? '+' : '') + netUnits.toFixed(2) + 'u';
netEl.className = 'value ' + (netUnits >= 0 ? 'pos' : 'neg');

// ---------- Sport filter options ----------
const sports = [...new Set(RAW.map(r => r.sport))].sort();
const sportSel = document.getElementById('sportFilter');
sports.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s; opt.textContent = s;
  sportSel.appendChild(opt);
});

// ---------- Table rendering ----------
function fmtOdds(o){
  return (o > 0 ? '+' : '') + o.toFixed(0);
}
function fmtUnits(u){
  return u.toFixed(2).replace(/\.?0+$/,'') || '0';
}
function fmtPnl(p){
  if (Math.abs(p) < 0.001) return { txt: '0.00u', cls: 'pnl-zero' };
  return { txt: (p >= 0 ? '+' : '') + p.toFixed(2) + 'u', cls: p >= 0 ? 'pnl-pos' : 'pnl-neg' };
}

function renderTable(){
  const sportF = sportSel.value;
  const resultF = document.getElementById('resultFilter').value;
  let rows = RAW.filter(r => (sportF === 'ALL' || r.sport === sportF) && (resultF === 'ALL' || r.wl === resultF));
  rows = rows.slice().sort((a,b) => b._ts - a._ts || 0);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const p = fmtPnl(r.pnl);
    const dateStr = new Date(r._ts).toLocaleDateString('en-US', {month:'2-digit', day:'2-digit', year:'numeric'});
    const flatTag = r.flat ? ' <span class="flat-tag">FLAT</span>' : '';
    tr.innerHTML = `
      <td>${dateStr}</td>
      <td>${r.sel}${flatTag}</td>
      <td>${fmtOdds(r.odds)}</td>
      <td>${r.sport}</td>
      <td class="res-${r.wl}">${r.wl}</td>
      <td>${fmtUnits(r.units)}</td>
      <td class="${p.cls}">${p.txt}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('rowCount').textContent = `${rows.length} selections`;
}

sportSel.addEventListener('change', renderTable);
document.getElementById('resultFilter').addEventListener('change', renderTable);

// ---------- Chart ----------
function buildChart(){
  const svg = document.getElementById('chartSvg');
  const chronological = RAW.slice().sort((a,b) => a._ts - b._ts);
  const vals = [];
  let cum = 0;
  chronological.forEach(r => { cum += r.pnl; vals.push(cum); });

  const W = 1000, H = 340, PL = 46, PR = 20, PT = 20, PB = 34;
  const n = vals.length;
  const minV = Math.min(0, ...vals);
  const maxV = Math.max(0, ...vals) + 3;
  const range = maxV - minV || 1;

  const xPos = i => PL + (i / (n - 1)) * (W - PL - PR);
  const yPos = v => PT + (1 - (v - minV) / range) * (H - PT - PB);
  const zy = yPos(0);

  let s = '';

  // horizontal gridlines
  const gridStep = range > 30 ? 10 : range > 15 ? 5 : 2;
  for (let g = Math.ceil(minV / gridStep) * gridStep; g <= maxV; g += gridStep) {
    const y = yPos(g);
    s += `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e2f42" stroke-width="1"/>`;
    s += `<text x="${PL-8}" y="${y+4}" text-anchor="end" fill="#7a8a9a" font-size="10">${g > 0 ? '+' + g : g}</text>`;
  }

  // zero line emphasis
  s += `<line x1="${PL}" y1="${zy}" x2="${W-PR}" y2="${zy}" stroke="#3a4d5e" stroke-width="1.2"/>`;

  // x-axis date labels (about 10 labels)
  const step = Math.max(1, Math.ceil(n / 10));
  for (let i = 0; i < n; i += step) {
    const x = xPos(i);
    const d = new Date(chronological[i]._ts);
    const lbl = (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0');
    s += `<text x="${x}" y="${H-10}" text-anchor="middle" fill="#7a8a9a" font-size="10">${lbl}</text>`;
  }

  // fill area
  let fillPath = `M ${xPos(0)} ${zy}`;
  vals.forEach((v,i) => { fillPath += ` L ${xPos(i)} ${yPos(v)}`; });
  fillPath += ` L ${xPos(n-1)} ${zy} Z`;
  s += `<path d="${fillPath}" fill="rgba(201,168,76,0.14)"/>`;

  // line
  let linePath = `M ${xPos(0)} ${yPos(vals[0])}`;
  vals.forEach((v,i) => { if (i>0) linePath += ` L ${xPos(i)} ${yPos(v)}`; });
  s += `<path d="${linePath}" fill="none" stroke="#c9a84c" stroke-width="2.2"/>`;

  // final dot + label
  const lx = xPos(n-1), ly = yPos(vals[n-1]);
  s += `<circle cx="${lx}" cy="${ly}" r="4.5" fill="#c9a84c"/>`;
  const finalLabel = (vals[n-1] >= 0 ? '+' : '') + vals[n-1].toFixed(2) + 'u';
  s += `<text x="${lx-8}" y="${ly-10}" text-anchor="end" fill="#c9a84c" font-size="13" font-weight="bold">${finalLabel}</text>`;

  svg.innerHTML = s;
}

buildChart();
renderTable();
</script>
